<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#2b0140,#160020);
color:white;
}

.container{
width:1200px;
margin:auto;
padding:20px;
display:none;
}

.card{
background:linear-gradient(180deg,#4b1b68,#2a0d3d);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,200,.2);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.title{
font-size:26px;
font-weight:bold;
}

/* ROADMAP */

.roadmap{
display:grid;
grid-template-columns:repeat(14,40px);
gap:6px;
justify-content:center;
padding:20px;
background:linear-gradient(180deg,#5c2d87,#2e2c8a);
border-radius:12px;
overflow-x:auto;
}

.cell{
width:40px;
height:40px;
border-radius:8px;
background:#eee;
}

.banker{background:#ff2e2e;}
.player{background:#2e6cff;}
.tie{background:#17c200;}

/* BUTTONS */

.controls{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

button{
border:none;
padding:12px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btnB{background:#ff2e2e;color:white;}
.btnP{background:#2e6cff;color:white;}
.btnT{background:#00b300;color:white;}
.btnUndo{background:#ff9800;color:white;}
.btnClear{background:#444;color:white;}

.row{
display:flex;
gap:20px;
}

.panel{
flex:1;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
border-bottom:2px solid #ff3bd4;
}

/* STATS */

.statbox{
display:flex;
justify-content:space-around;
margin-bottom:20px;
}

.circle{
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.b{background:red;}
.p{background:blue;}
.t{background:green;}

.bar{
height:12px;
background:#ccc;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
}

.fill.b{background:red;}
.fill.p{background:#2e6cff;}
.fill.t{background:green;}

#lineA,#lineB,#lineC{
padding:8px;
font-size:18px;
margin:4px 0;
}

.signalP{color:#0066ff}
.signalB{color:#ff0000}
.wait{color:#aaa}

.historyRow{
display:flex;
align-items:center;
margin:6px 0;
gap:10px;
}

.history{
display:flex;
gap:4px;
overflow-x:auto;
white-space:nowrap;
max-width:900px;
}

.histBox{
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
border-radius:4px;
background:#333;
}
 
.win{
background:#00c853;
}

.lose{
background:#ff1744;
}

.blinkHigh{
animation:blinkHigh 0.8s infinite alternate;
font-weight:bold;
color:#00ff9c;
}

@keyframes blinkHigh{
0%{opacity:1}
100%{opacity:0.3}
}

.loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#2b0140,#160020);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loginBox{
background:linear-gradient(180deg,#4b1b68,#2a0d3d);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,200,.3);
}

.loginBox h2{
margin-bottom:20px;
}

.loginBox input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

.loginBtn{
width:100%;
padding:10px;
background:#ff2e9f;
color:white;
font-weight:bold;
border:none;
border-radius:6px;
cursor:pointer;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.passWrap{
position:relative;
}

.expire{
margin-top:10px;
font-size:14px;
color:#ffb3ff;
}

</style>
</head>

<body>

    <div class="loginPage" id="loginPage">

<div class="loginBox">

<h2>Baccarat Login</h2>

<input id="user" placeholder="Username">

<div class="passWrap">
<input id="pass" type="password" placeholder="Password">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button class="loginBtn" onclick="login()">LOGIN</button>


</div>
</div>

<div class="container">

<!-- ROADMAP -->

<div class="card">
<div class="header">

<div class="title">
Baccarat Recorder
<div id="expireText" style="font-size:14px;">
วันหมดอายุ : 28 มีนาคม พ.ศ. 2569
</div>
</div>

<div>
ผลล่าสุด: <span id="lastResult">-</span>
</div>

</div>

<div class="roadmap" id="roadmap"></div>

<div class="controls">

<button class="btnP" onclick="addResult('P')">PLAYER</button>
<button class="btnB" onclick="addResult('B')">BANKER</button>
<button class="btnT" onclick="addResult('T')">TIE</button>

<button class="btnUndo" onclick="undo()">UNDO</button>
<button class="btnClear" onclick="clearBoard()">CLEAR</button>

</div>

</div>

<!-- STATS -->

<div class="row">

<div class="card panel">

<h2>สถิติ</h2>

<div class="statbox">

<div class="circle b">B <span id="countB">0</span></div>
<div class="circle p">P <span id="countP">0</span></div>
<div class="circle t">T <span id="countT">0</span></div>

</div>
<!-- AI HISTORY -->

<div class="historyRow">
<div id="labelA"></div>
<div id="histA" class="history"></div>
</div>

<div class="historyRow">
<div id="labelB"></div>
<div id="histB" class="history"></div>
</div>

<div class="historyRow">
<div id="labelC"></div>
<div id="histC" class="history"></div>
</div>
</div>

<!-- CARD : AI ANALYSIS -->

<div class="card">

<h2>AI วิเคราะห์</h2>

<div id="aiBox">

<div id="lineA">A → -</div>
<div id="lineB">B → -</div>
<div id="lineC">C → -</div>

<hr>

<div id="finalBet" style="font-size:22px;font-weight:bold;">
🔥 แทง: -
</div>

<div id="confidence">
Confidence 0%
</div>

</div>

</div> <!-- ปิด card AI -->

</div> <!-- ปิด row -->

<script>

const roadmap = document.getElementById("roadmap")

const cols = 14
const rows = 6

const cells = []
const results = []
const aiStats = {

A:{win:0,lose:0,total:0,last:null},
B:{win:0,lose:0,total:0,last:null},
C:{win:0,lose:0,total:0,last:null}

}

const aiHistory = {
A:[],
B:[],
C:[]
}

let currentRow = 0
let currentCol = 0




/* สร้าง grid */

for(let r=0;r<rows;r++){

 for(let c=0;c<cols;c++){

  const cell = document.createElement("div")
  cell.className="cell"

  roadmap.appendChild(cell)

  cells.push(cell)

 }

}

/* เพิ่มผล */
function addResult(type){

if(results.length >= cols*rows) return

 /* เพิ่มผลก่อน */

 results.push(type)

 /* วิเคราะห์ AI */

 analyzeAI()

 /* ตรวจผล AI */

 checkAIPredict(type)

 drawBead()
 updateStats()
 renderHistory()

 document.getElementById("lastResult").textContent = type

}

/* =========================
PROGRAM EXPIRE SYSTEM
========================= */

const EXPIRE_DATE = new Date("2026-03-28T23:59:59")

function checkExpire(){

const now = new Date()

if(now > EXPIRE_DATE){

document.body.innerHTML = `
<div style="
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#160020;
color:white;
font-family:Segoe UI;
flex-direction:column;
">

<h1 style="color:#ff2e9f">PROGRAM EXPIRED</h1>

<p>โปรแกรมหมดอายุแล้ว</p>

<p>กรุณาติดต่อผู้พัฒนา</p>

</div>
`

}

}

checkExpire()

/* วาด Bead Road */

function drawBead(){

 cells.forEach(c=>c.className="cell");

 currentRow=0;
 currentCol=0;

 results.forEach(r=>{

  const index=currentRow*cols+currentCol;

  if(!cells[index]) return;

  if(r==="B") cells[index].classList.add("banker");
  if(r==="P") cells[index].classList.add("player");
  if(r==="T") cells[index].classList.add("tie");

  currentRow++;

  if(currentRow>=rows){
   currentRow=0;
   currentCol++;
  }

 });

 roadmap.scrollLeft=roadmap.scrollWidth;

}
/* เพิ่มฟังก์ชันนี้ */

function updateStats(){

let B = results.filter(r=>r==="B").length
let P = results.filter(r=>r==="P").length
let T = results.filter(r=>r==="T").length

document.getElementById("countB").textContent = B
document.getElementById("countP").textContent = P
document.getElementById("countT").textContent = T

}


/* CLEAR */
function clearBoard(){

 results.length = 0;

 currentRow = 0;
 currentCol = 0;

 // reset AI
 ["A","B","C"].forEach(line=>{
  aiStats[line]={win:0,lose:0,total:0,last:null};
  aiHistory[line]=[];
 });

 // reset grid
 cells.forEach(c=>{
  c.className="cell";
 });

 updateStats();
 renderHistory();

 document.getElementById("lastResult").textContent="-";

}

function undo(){

if(results.length===0) return

results.pop()

drawBead()
updateStats()
renderHistory()

}

function checkAIPredict(result){

// กรอง T ออก
if(result==="T") return

["A","B","C"].forEach(line=>{

let pred = aiStats[line].last
if(!pred) return

aiStats[line].total++

let win = pred==result

if(win){
aiStats[line].win++
aiHistory[line].push(1)
}else{
aiStats[line].lose++
aiHistory[line].push(0)
}

/* limit history */

if(aiHistory[line].length>40){
aiHistory[line].shift()
}

})

renderHistory()

}

/* =========================
RENDER HISTORY
========================= */

function renderHistory(){

["A","B","C"].forEach(line=>{

let el = document.getElementById("hist"+line)
let label = document.getElementById("label"+line)

let stat = aiStats[line]

let acc = stat.total
? Math.round(stat.win/stat.total*100)
: 0

/* เปลี่ยนสี PLAYER / BANKER */

let bet = stat.last=="B"
 ? "<span class='signalB'>BANKER</span>"
 : stat.last=="P"
 ? "<span class='signalP'>PLAYER</span>"
 : "-"

/* กำหนด class สำหรับ blink */

let cls = acc >= 60 ? "blinkHigh" : ""

/* แสดงผล */

label.innerHTML =
line+" → "+bet+" <span class='"+cls+"'>"+acc+"%</span>"

el.innerHTML=""

/* สร้างช่อง history */

aiHistory[line].forEach(v=>{

let box = document.createElement("div")

box.className = "histBox " + (v ? "win" : "lose")
box.textContent = v ? "✔" : "✖"

el.appendChild(box)

})

/* auto scroll ไปช่องล่าสุด */

el.scrollLeft = el.scrollWidth

})

}

/* =========================
AI DISPLAY
========================= */

function renderAI(lineA,lineB,lineC,bet,confidence){

const elA=document.getElementById("lineA")
const elB=document.getElementById("lineB")
const elC=document.getElementById("lineC")

const final=document.getElementById("finalBet")
const conf=document.getElementById("confidence")

function txt(v){
 if(v=="B") return "<span class='signalB'>BANKER</span>"
 if(v=="P") return "<span class='signalP'>PLAYER</span>"
 return "-"
}

elA.innerHTML="A → "+txt(lineA)
elB.innerHTML="B → "+txt(lineB)
elC.innerHTML="C → "+txt(lineC)

final.innerHTML="🔥 แทง: "+txt(bet)

conf.innerHTML="Confidence "+confidence+"%"

}




function analyzeAI(){

if(results.length < 3){
return
}

/* กรอง T ออก */
let last = results.filter(x=>x!=="T").slice(-3)

/* ป้องกันข้อมูลไม่พอหลังกรอง T */

if(last.length < 3){
renderHistory()
return
}

/* นับ B P */

let B = last.filter(x=>x=="B").length
let P = last.filter(x=>x=="P").length

/* ----------------
TREND
---------------- */

let trend = B>P ? "B" : "P"

/* ----------------
CHOP
---------------- */

let chop=0

for(let i=1;i<last.length;i++){
if(last[i]!=last[i-1]) chop++
}

let chopRate = chop/(last.length-1)

/* ----------------
RUN
---------------- */

let run=1
let maxRun=1

for(let i=1;i<last.length;i++){

if(last[i]==last[i-1]){
run++
}else{
run=1
}

if(run>maxRun) maxRun=run

}

/* ----------------
LINE A
ตามเทรนด์
---------------- */

let lineA = trend

/* ----------------
LINE B
กัน chop
---------------- */

let lineB = chopRate>0.6 ? trend : (trend=="B"?"P":"B")

/* ----------------
LINE C
balance
---------------- */

let lineC = B>P ? "P":"B"

/* ----------------
CONFIDENCE
---------------- */

let scoreB=0
let scoreP=0

if(lineA=="B") scoreB++; else scoreP++
if(lineB=="B") scoreB++; else scoreP++
if(lineC=="B") scoreB++; else scoreP++

let bet = scoreB>scoreP ? "B":"P"
let confidence = Math.round(Math.max(scoreB,scoreP)/3*100)
renderAI(lineA,lineB,lineC,bet,confidence)

/* บันทึก prediction */

aiStats.A.last = lineA
aiStats.B.last = lineB
aiStats.C.last = lineC

/* อัปเดต UI */

renderHistory()

}


drawBead()
updateStats()
renderHistory()


/* =========================
LOGIN SYSTEM
========================= */

/* =========================
LOGIN SYSTEM
========================= */

function login(){

const user = document.getElementById("user").value
const pass = document.getElementById("pass").value

const USERNAME = "1234"
const PASSWORD = "1234"

if(user === USERNAME && pass === PASSWORD){

document.getElementById("loginPage").style.display = "none"
document.querySelector(".container").style.display = "block"

}else{

alert("Login ไม่ถูกต้อง")

document.getElementById("user").value=""
document.getElementById("pass").value=""
document.getElementById("user").focus()

}

}

/* =========================
SHOW / HIDE PASSWORD
========================= */

function togglePass(){

const pass = document.getElementById("pass")

if(pass.type === "password"){
pass.type = "text"
}else{
pass.type = "password"
}

}

/* =========================
ENTER KEY LOGIN
========================= */

document.getElementById("pass").addEventListener("keypress", function(e){

if(e.key === "Enter"){
login()
}

})

</script>

</body>
</html>
